---
# ---------------------------------------------------------------------------
# Autolab Stage Registry (workflow.yaml)
# ---------------------------------------------------------------------------
# Single source of truth for per-stage metadata: prompt files, required
# tokens, required output artifacts, verifier categories, successor stages,
# and stage classifications.
#
# The orchestrator, prompt renderer, and verification system can all read
# this file to avoid hard-coded stage-specific logic scattered across the
# codebase.  Runtime overrides (e.g. verifier_policy.yaml) take precedence
# where applicable.
#
# Pattern Path Convention:
#   Paths containing <RUN_ID>, <ITERATION_ID>, or similar angle-bracket
#   tokens are *pattern paths* -- templates resolved at runtime. They are
#   NOT literal filesystem paths.
#   Example: required_outputs: [runs/<RUN_ID>/run_manifest.json]
#   At runtime <RUN_ID> is replaced with the actual run ID from state,
#   e.g. runs/20260218T160045Z/run_manifest.json
#
# Classification note:
#   classifications.decision means "this stage is selectable as a decision
#   target (e.g., decide_repeat.decision_map)", not "this stage itself makes
#   a branching decision".
# ---------------------------------------------------------------------------
schema_version: '1.0'
stages:
  hypothesis:
    prompt_file: stage_hypothesis.audit.md
    runner_prompt_file: stage_hypothesis.runner.md
    brief_prompt_file: stage_hypothesis.brief.md
    human_prompt_file: stage_hypothesis.human.md
    required_tokens: [iteration_id, iteration_path, hypothesis_id]
    optional_tokens: []
    required_outputs: [hypothesis.md]
    next_stage: design
    verifier_categories:
      tests: false
      dry_run: false
      schema: true
      prompt_lint: true
      consistency: false
      env_smoke: false
      docs_target_update: false
    classifications:
      active: true
      terminal: false
      decision: true
      runner_eligible: true
  design:
    prompt_file: stage_design.audit.md
    runner_prompt_file: stage_design.runner.md
    brief_prompt_file: stage_design.brief.md
    human_prompt_file: stage_design.human.md
    required_tokens: [iteration_id, iteration_path, hypothesis_id]
    optional_tokens: [available_memory_gb, experiment_id, recommended_memory_estimate]
    # design.yaml contract now includes extract_parser so extraction failures surface
    # during design schema validation instead of late-stage runtime failure.
    required_outputs: [design.yaml]
    next_stage: implementation
    verifier_categories:
      tests: false
      dry_run: false
      schema: true
      prompt_lint: true
      consistency: false
      env_smoke: false
      docs_target_update: false
    classifications:
      active: true
      terminal: false
      decision: true
      runner_eligible: true
  implementation:
    prompt_file: stage_implementation.audit.md
    runner_prompt_file: stage_implementation.runner.md
    brief_prompt_file: stage_implementation.brief.md
    human_prompt_file: stage_implementation.human.md
    required_tokens: [iteration_id, iteration_path]
    optional_tokens: [review_feedback, verifier_errors]
    required_outputs: [implementation_plan.md, plan_contract.json]
    next_stage: implementation_review
    verifier_categories:
      tests: false
      dry_run: true  # Capability flag. Actual requirement controlled by verifier_policy.yaml
      schema: true
      prompt_lint: true
      consistency: false
      env_smoke: false
      docs_target_update: false
    classifications:
      active: true
      terminal: false
      decision: false
      runner_eligible: true
  implementation_review:
    prompt_file: stage_implementation_review.audit.md
    runner_prompt_file: stage_implementation_review.runner.md
    brief_prompt_file: stage_implementation_review.brief.md
    human_prompt_file: stage_implementation_review.human.md
    required_tokens: [iteration_id, iteration_path]
    optional_tokens: [diff_summary, dry_run_output, verifier_outputs]
    required_outputs: [implementation_review.md, review_result.json]
    next_stage: launch
    verifier_categories:
      tests: false
      dry_run: true
      schema: true
      prompt_lint: true
      consistency: true
      env_smoke: true
      docs_target_update: true
    classifications:
      active: true
      terminal: false
      decision: false
      runner_eligible: true
  launch:
    prompt_file: stage_launch.audit.md
    runner_prompt_file: stage_launch.runner.md
    brief_prompt_file: stage_launch.brief.md
    human_prompt_file: stage_launch.human.md
    required_tokens: [iteration_id, iteration_path, run_id]
    optional_tokens: [launch_mode, recommended_memory_estimate, run_group, replicate_count, launch_execute]
    required_outputs: [runs/<RUN_ID>/run_manifest.json]
    required_outputs_any_of:
      - [launch/run_local.sh, launch/run_slurm.sbatch]
    required_outputs_if:
      - host_mode: slurm
        outputs: [docs/slurm_job_list.md]
    next_stage: slurm_monitor
    verifier_categories:
      tests: false
      dry_run: false
      schema: true
      prompt_lint: true
      consistency: true
      env_smoke: true
      docs_target_update: false
    classifications:
      active: true
      terminal: false
      decision: false
      runner_eligible: false
  slurm_monitor:
    prompt_file: stage_slurm_monitor.audit.md
    runner_prompt_file: stage_slurm_monitor.runner.md
    brief_prompt_file: stage_slurm_monitor.brief.md
    human_prompt_file: stage_slurm_monitor.human.md
    required_tokens: [iteration_id, iteration_path, run_id]
    optional_tokens: []
    required_outputs: [runs/<RUN_ID>/run_manifest.json]
    required_outputs_if:
      - host_mode: slurm
        outputs: [docs/slurm_job_list.md]
    next_stage: extract_results
    verifier_categories:
      tests: false
      dry_run: false
      schema: true
      prompt_lint: true
      consistency: true
      env_smoke: true
      docs_target_update: false
    classifications:
      active: true
      terminal: false
      decision: false
      runner_eligible: false
  extract_results:
    prompt_file: stage_extract_results.audit.md
    runner_prompt_file: stage_extract_results.runner.md
    brief_prompt_file: stage_extract_results.brief.md
    human_prompt_file: stage_extract_results.human.md
    required_tokens: [iteration_id, iteration_path, run_id]
    optional_tokens: [run_group, replicate_count]
    # extract_results contract: metrics + summary are required outputs. Summary must
    # be written by the parser hook or by configured summary.llm_command fallback.
    required_outputs: [runs/<RUN_ID>/metrics.json, analysis/summary.md]
    next_stage: update_docs
    verifier_categories:
      tests: false
      dry_run: false
      schema: true
      prompt_lint: true
      consistency: true
      env_smoke: true
      docs_target_update: false
    classifications:
      active: true
      terminal: false
      decision: false
      runner_eligible: false
  update_docs:
    prompt_file: stage_update_docs.audit.md
    runner_prompt_file: stage_update_docs.runner.md
    brief_prompt_file: stage_update_docs.brief.md
    human_prompt_file: stage_update_docs.human.md
    required_tokens: [iteration_id, iteration_path, run_id]
    optional_tokens: [paper_targets, metrics_summary, target_comparison]
    required_outputs: [docs_update.md]
    next_stage: decide_repeat
    verifier_categories:
      tests: false
      dry_run: false
      schema: true
      prompt_lint: true
      consistency: true
      env_smoke: false
      docs_target_update: true
    classifications:
      active: true
      terminal: false
      decision: false
      runner_eligible: true
  decide_repeat:
    prompt_file: stage_decide_repeat.audit.md
    runner_prompt_file: stage_decide_repeat.runner.md
    brief_prompt_file: stage_decide_repeat.brief.md
    human_prompt_file: stage_decide_repeat.human.md
    required_tokens: [iteration_id, iteration_path, run_id]
    optional_tokens: [metrics_summary, target_comparison, decision_suggestion, auto_metrics_evidence]
    required_outputs: [decision_result.json]
    next_stage: ''
    decision_map:
      design: design
      hypothesis: hypothesis
      stop: stop
      human_review: human_review
    verifier_categories:
      tests: false
      dry_run: false
      schema: true
      prompt_lint: true
      consistency: true
      env_smoke: false
      docs_target_update: false
    classifications:
      active: true
      terminal: false
      decision: true
      runner_eligible: true
  human_review:
    prompt_file: stage_human_review.audit.md
    runner_prompt_file: stage_human_review.runner.md
    brief_prompt_file: stage_human_review.brief.md
    human_prompt_file: stage_human_review.human.md
    required_tokens: []
    optional_tokens: []
    required_outputs: []
    next_stage: ''
    verifier_categories:
      tests: false
      dry_run: false
      schema: false
      prompt_lint: false
      consistency: false
      env_smoke: false
      docs_target_update: false
    classifications:
      active: false
      terminal: true
      decision: true
      runner_eligible: false
  stop:
    prompt_file: stage_stop.audit.md
    runner_prompt_file: stage_stop.runner.md
    brief_prompt_file: stage_stop.brief.md
    human_prompt_file: stage_stop.human.md
    required_tokens: []
    optional_tokens: []
    required_outputs: []
    next_stage: ''
    verifier_categories:
      tests: false
      dry_run: false
      schema: false
      prompt_lint: false
      consistency: false
      env_smoke: false
      docs_target_update: false
    classifications:
      active: false
      terminal: true
      decision: true
      runner_eligible: false
