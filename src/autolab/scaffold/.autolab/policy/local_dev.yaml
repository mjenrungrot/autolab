---
requirements_by_stage:
  implementation:
    tests: false
    dry_run: false
    schema: true
    prompt_lint: true
    consistency: false
    env_smoke: false
    docs_target_update: false
  implementation_review:
    tests: false
    dry_run: false
    schema: true
    prompt_lint: true
    consistency: true
    env_smoke: true
    docs_target_update: true
prompt_lint:
  mode: warn
safe_automation_protected_files: false
autorun:
  guardrails:
    max_same_decision_streak: 5
    max_no_progress_decisions: 3
    max_update_docs_cycles: 5
  campaign:
    complexity_proxy: changed_surface
    change_size_metric: files
    max_fix_attempts_per_idea: 2
    max_timeout_factor: 2.0
    max_no_improvement_streak: 3
    max_crash_streak_before_rethink: 2
