  hypothesis:
    tests: true
    dry_run: false
    schema: true
    prompt_lint: true
    consistency: false
    env_smoke: false
    docs_target_update: false
  design:
    tests: true
    dry_run: false
    schema: true
    prompt_lint: true
    consistency: false
    env_smoke: false
    docs_target_update: false
  implementation:
    tests: true
    dry_run: true
    schema: true
    prompt_lint: true
    consistency: false
    env_smoke: false
    docs_target_update: false
  implementation_review:
    tests: true
    dry_run: true
    schema: true
    prompt_lint: true
    consistency: true
    env_smoke: true
    docs_target_update: true
  launch:
    tests: true
    dry_run: false
    schema: true
    prompt_lint: true
    consistency: true
    env_smoke: true
    docs_target_update: false
  slurm_monitor:
    tests: false
    dry_run: false
    schema: false
    prompt_lint: false
    consistency: false
    env_smoke: true
    docs_target_update: false
  extract_results:
    tests: true
    dry_run: false
    schema: true
    prompt_lint: true
    consistency: true
    env_smoke: true
    docs_target_update: false
  update_docs:
    tests: true
    dry_run: false
    schema: true
    prompt_lint: true
    consistency: true
    env_smoke: false
    docs_target_update: true
  decide_repeat:
    tests: true
    dry_run: false
    schema: true
    prompt_lint: true
    consistency: true
    env_smoke: false
    docs_target_update: false
prompt_lint:
  mode: enforce
implementation_plan_lint:
  scope_enforcement:
    fail_on_out_of_scope_touches: true
safe_automation_protected_files: true
autorun:
  campaign:
    complexity_proxy: changed_surface
    change_size_metric: files
    max_fix_attempts_per_idea: 2
    max_timeout_factor: 2.0
    max_no_improvement_streak: 3
    max_crash_streak_before_rethink: 2
