---
schema_version: "1.0"
id: e_golden
iteration_id: iter_golden
hypothesis_id: h_golden
entrypoint:
  module: pkg.train
  args:
    config: configs/train_golden.yaml
compute:
  location: local
  walltime_estimate: 00:50:00
  memory_estimate: 64GB
  gpu_count: 0
metrics:
  primary:
    name: validation_accuracy
    unit: '%'
    mode: maximize
  secondary: [validation_loss]
  success_delta: +1.0%
  aggregation: mean
  baseline_comparison: vs previous stable checkpoint
baselines:
  - name: baseline_current
    description: Current production training recipe
implementation_requirements:
  - requirement_id: R1
    description: Add calibrated augmentation schedule configuration and training wiring.
    scope_kind: experiment
    expected_artifacts: [implementation_plan.md, plan_contract.json]
  - requirement_id: R2
    description: Add deterministic seed handling for augmentation schedule tests.
    scope_kind: project_wide
    expected_artifacts: [implementation_plan.md, plan_contract.json]
extract_parser:
  kind: command
  command: "python -m tools.extract_results --run-id {run_id} --iteration-path {iteration_path}"
variants:
  - name: aug_schedule_calibrated
    changes:
      augmentation:
        schedule: calibrated_v2
